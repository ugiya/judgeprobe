name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]" --quiet
      - run: judgeprobe validate probes/
      - run: pytest -q
      - run: judgeprobe run --model mock --runs 3 --out /tmp/ci --seed 0
      - run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          csv_path = sorted(Path("/tmp/ci").glob("*.csv"))[-1]
          rows = list(csv.DictReader(csv_path.open(encoding="utf-8")))
          stock = [
              row for row in rows
              if row["suite"] == "bound_max"
              and row["payload"] == "max_addressed_to_model"
              and row["arm"] == "stock"
          ]
          hardened = [
              row for row in rows
              if row["suite"] == "bound_max"
              and row["payload"] == "max_addressed_to_model"
              and row["arm"] == "hardened"
          ]
          assert stock and all(row["landed"] == "1" for row in stock)
          assert hardened and all(row["landed"] == "0" for row in hardened)
          PY

